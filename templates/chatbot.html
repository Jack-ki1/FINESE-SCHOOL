{% extends "base.html" %}
{% block title %}AI Chat{% endblock %}

{% block content %}
<div class="container-fluid py-3 h-100">
    <div class="row h-100">
        <!-- Conversation List -->
        <div class="col-md-3 d-md-block px-3 pt-3" id="conversationSidebar" style="background: var(--bs-gray-100);">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Conversations</h5>
                <button class="btn btn-sm btn-primary" onclick="createNewConversation()">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>
            <div id="conversationsList" class="mb-3">
                <!-- Conversations will be loaded here -->
            </div>
            
            <!-- Settings Panel -->
            <div class="card shadow-sm">
                <div class="card-header py-2">
                    <h6 class="mb-0">
                        <i class="bi bi-gear me-1"></i>Settings
                        <button class="btn btn-sm btn-link p-0 float-end" onclick="toggleSettings()">
                            <i class="bi bi-chevron-down" id="settingsChevron"></i>
                        </button>
                    </h6>
                </div>
                <div class="card-body p-3" id="settingsPanel">
                    <div class="mb-3">
                        <label class="form-label">Provider</label>
                        <select class="form-select form-select-sm" id="providerSelect" onchange="saveSettings()">
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic</option>
                            <option value="google">Google</option>
                            <option value="huggingface">HuggingFace</option>
                            <option value="ollama">Ollama</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Model</label>
                        <input type="text" class="form-control form-control-sm" id="modelInput" onchange="saveSettings()">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Temperature: <span id="tempValue">0.7</span></label>
                        <input type="range" class="form-range" id="tempSlider" min="0" max="1" step="0.1" value="0.7" onchange="saveSettings(); document.getElementById('tempValue').textContent = this.value;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Max Tokens</label>
                        <input type="number" class="form-control form-control-sm" id="maxTokensInput" value="1024" onchange="saveSettings()">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">System Message</label>
                        <textarea class="form-control form-control-sm" id="systemMsgInput" rows="3" onchange="saveSettings()"></textarea>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Chat Area -->
        <div class="col-md-9 d-flex flex-column h-100">
            <div class="card shadow-sm h-100 d-flex flex-column">
                <div class="card-header d-flex justify-content-between align-items-center py-2">
                    <h6 class="mb-0" id="chatTitle">New Chat</h6>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary me-1" onclick="toggleSidebar()">
                            <i class="bi bi-layout-sidebar"></i>
                        </button>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-secondary" onclick="renameConversation()">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-outline-danger" onclick="deleteCurrentConversation()">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="card-body flex-grow-1 overflow-auto" id="chatMessages" style="overflow-y:auto">
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-robot" style="font-size:3rem"></i>
                        <p class="mt-2">Start a conversation with your AI assistant!</p>
                        <p class="small">Supports SQL, Python, data analysis, and more.</p>
                    </div>
                </div>

                <!-- Input -->
                <div class="card-footer">
                    <div class="input-group">
                        <textarea id="chatInput" class="form-control" rows="1" placeholder="Ask about SQL, Python, data analysis..." data-autoresize
                                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                        <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn"><i class="bi bi-send"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<!-- Load dependencies for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.css">

<script>
// Dependencies needed by renderMarkdown
// - DOMPurify for sanitizing marked output
// - marked for markdown parsing
// - Prism for syntax highlighting
</script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script>
// Current conversation ID
let currentConvId = null;
let currentConvTitle = 'New Chat';
let isStreaming = false;


// ── Initial Load ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    // If sidebar items are not yet present, create a conversation.
    loadConversations().then(() => loadSettings());

    
    // Auto-open first conversation if exists
    setTimeout(() => {
        const firstItem = document.querySelector('#conversationsList .list-group-item');
        if (firstItem) {
            firstItem.click();
        } else {
            createNewConversation();
        }
    }, 500);
});

// ── Conversation Management ────────────────────────────────────
async function loadConversations() {
    const res = await safeFetch('/api/conversations');
    const container = document.getElementById('conversationsList');
    
    if (!res.conversations || res.conversations.length === 0) {
        container.innerHTML = '<p class="text-muted small text-center py-2">No conversations yet</p>';
        return;
    }
    
    container.innerHTML = res.conversations.map(c => `
        <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-2"
             data-id="${c.id}" onclick="switchConversation('${c.id}', '${escapeHtml(c.title)}')">
            <div class="text-truncate">
                <i class="bi bi-chat-dots me-1"></i>
                <span>${escapeHtml(c.title)}</span>
            </div>
            <button class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation(); deleteConversation('${c.id}')">
                <i class="bi bi-x"></i>
            </button>
        </div>
    `).join('');
    
    // Highlight current conversation
    if (currentConvId) {
        const items = document.querySelectorAll('#conversationsList .list-group-item');
        items.forEach(item => {
            if (item.dataset.id === currentConvId) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }
}

async function switchConversation(id, title) {
    currentConvId = id;
    currentConvTitle = title;
    document.getElementById('chatTitle').textContent = title;
    
    // Highlight selected conversation
    document.querySelectorAll('#conversationsList .list-group-item').forEach(item => {
        item.classList.remove('active');
    });
    document.querySelector(`#conversationsList [data-id="${id}"]`).classList.add('active');
    
    await loadMessages(id);
}

async function createNewConversation() {
    const res = await safeFetch('/api/conversations', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title: 'New Chat'})
    });
    
    if (res.conversation) {
        switchConversation(res.conversation.id, res.conversation.title);
        loadConversations();
    }
}

async function deleteConversation(id) {
    if (!confirm('Delete this conversation?')) return;
    
    await safeFetch(`/api/conversations/${id}`, {method: 'DELETE'});
    loadConversations();
    
    if (currentConvId === id) {
        currentConvId = null;
        document.getElementById('chatMessages').innerHTML = 
            '<div class="text-center text-muted py-5"><i class="bi bi-robot" style="font-size:3rem"></i><p class="mt-2">Start a conversation with your AI assistant!</p></div>';
    }
}

async function deleteCurrentConversation() {
    if (currentConvId) {
        deleteConversation(currentConvId);
    }
}

async function renameConversation() {
    if (!currentConvId) return;
    
    const newTitle = prompt('Enter new title:', currentConvTitle);
    if (newTitle && newTitle !== currentConvTitle) {
        await safeFetch(`/api/conversations/${currentConvId}`, {
            method: 'PUT', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({title: newTitle})
        });
        currentConvTitle = newTitle;
        document.getElementById('chatTitle').textContent = newTitle;
        loadConversations();
    }
}

// ── Message Loading/Sending ────────────────────────────────────
async function loadMessages(convId) {
    const res = await safeFetch(`/api/conversations/${convId}/messages`);
    const container = document.getElementById('chatMessages');
    
    if (!res.messages || res.messages.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-robot" style="font-size:3rem"></i><p class="mt-2">Start a conversation with your AI assistant!</p><p class="small">Supports SQL, Python, data analysis, and more.</p></div>';
        return;
    }
    
    container.innerHTML = res.messages.map(m => `
        <div class="message d-flex mb-3 ${m.role === 'user' ? 'justify-content-end' : 'justify-content-start'}">
            <div class="message-bubble d-flex ${m.role === 'user' ? 'flex-row-reverse' : ''}">
                <div class="avatar me-2 ms-0 ${m.role === 'user' ? 'me-0 ms-2' : ''}">
                    <i class="bi ${m.role === 'user' ? 'bi-person-circle' : 'bi-robot'} fs-5"></i>
                </div>
                <div class="bubble ${m.role === 'user' ? 'bg-primary text-white' : 'bg-light'}">
                    <div class="content">${renderMarkdown(m.content)}</div>
                    <small class="text-muted">${new Date(m.timestamp).toLocaleTimeString()}</small>
                </div>
            </div>
        </div>
    `).join('');
    
    container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
    if (isStreaming) return; // Prevent multiple simultaneous requests
    const chatInput = document.getElementById('chatInput');
    if (!chatInput) return;
    
    const input = document.getElementById('chatInput');
    const content = input.value.trim();
    if (!content) return;
    
    if (!currentConvId) {
        // Create new conversation
        const res = await safeFetch('/api/conversations', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({title: content.substring(0, 50)})
        });
        if (res.conversation) {
            currentConvId = res.conversation.id;
            currentConvTitle = res.conversation.title;
            document.getElementById('chatTitle').textContent = currentConvTitle;
            loadConversations();
        } else {
            showToast('Failed to create conversation', 'danger');
            return;
        }
    }
    
    // Add user message to UI immediately
    addUserMessage(content);
    input.value = '';
    
    // Disable input while waiting for response
    input.disabled = true;
    document.getElementById('sendBtn').disabled = true;
    isStreaming = true;
    
    try {
        // Use streaming endpoint
        const response = await fetch(`/api/conversations/${currentConvId}/messages`, {

            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                content: content,
                conversation_id: currentConvId,
                use_socratic: document.getElementById('socraticModeToggle')?.checked || false,
                subject_area: currentConvId.includes('learn') ? 'education' : 'general'
            })
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        // Process streaming response
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let assistantMessageElement = null;
        let fullResponse = '';
        
        // Create a temporary message bubble for the assistant response
        const container = document.getElementById('chatMessages');
        assistantMessageElement = document.createElement('div');
        assistantMessageElement.className = 'message d-flex mb-3 justify-content-start';
        assistantMessageElement.innerHTML = `
            <div class="message-bubble d-flex">
                <div class="avatar me-2">
                    <i class="bi bi-robot fs-5"></i>
                </div>
                <div class="bubble bg-light" id="temp-assistant-response">
                    <div class="content"><i>Thinking...</i></div>
                </div>
            </div>
        `;
        container.appendChild(assistantMessageElement);
        container.scrollTop = container.scrollHeight;
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            buffer += decoder.decode(value, { stream: true });
            
            // Process each complete event
            while (buffer.indexOf('\n\n') !== -1) {
                const eventEndIndex = buffer.indexOf('\n\n');
                const event = buffer.substring(0, eventEndIndex);
                buffer = buffer.substring(eventEndIndex + 2);
                
                if (event.startsWith('data: ')) {
                    const dataStr = event.substring(6); // Remove 'data: ' prefix
                    if (dataStr === '[DONE]') {
                        break;
                    }
                    
                    try {
                        const data = JSON.parse(dataStr);
                        
                        if (data.type === 'token' && data.content) {
                            fullResponse += data.content;
                            // Update the temporary message bubble
                            const contentDiv = document.getElementById('temp-assistant-response');
                            if (contentDiv) {
                                contentDiv.innerHTML = `<div class="content">${renderMarkdown(fullResponse)}</div>`;
                            }
                            container.scrollTop = container.scrollHeight;
                        } else if (data.type === 'complete') {
                            // Finalize the message with the complete response
                            const contentDiv = document.getElementById('temp-assistant-response');
                            if (contentDiv) {
                                contentDiv.innerHTML = `<div class="content">${renderMarkdown(data.content)}</div><small class="text-muted">${new Date().toLocaleTimeString()}</small>`;
                                contentDiv.id = ''; // Remove temporary ID
                            }
                            
                            // Add the message to the store
                            await safeFetch(`/api/conversations/${currentConvId}/messages`, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    role: 'assistant',
                                    content: data.content
                                })
                            });
                            
                            break;
                        } else if (data.type === 'error') {
                            const contentDiv = document.getElementById('temp-assistant-response');
                            if (contentDiv) {
                                contentDiv.innerHTML = `<div class="content text-danger">Error: ${data.content}</div><small class="text-muted">${new Date().toLocaleTimeString()}</small>`;
                                contentDiv.id = ''; // Remove temporary ID
                            }
                            break;
                        }
                    } catch (e) {
                        console.error('Error parsing stream data:', e);
                    }
                }
            }
        }
        
        reader.releaseLock();
    } catch (error) {
        console.error('Streaming error:', error);
        showToast(`Error: ${error.message}`, 'danger');
        
        // Remove the temporary message bubble if there was an error
        const tempBubble = document.getElementById('temp-assistant-response');
        if (tempBubble) {
            tempBubble.parentElement.parentElement.remove();
        }
    } finally {
        // Re-enable input
        input.disabled = false;
        document.getElementById('sendBtn').disabled = true;
        isStreaming = false;
    }
}

function addUserMessage(content) {
    const container = document.getElementById('chatMessages');
    const userMessage = document.createElement('div');
    userMessage.className = 'message d-flex mb-3 justify-content-end';
    userMessage.innerHTML = `
        <div class="message-bubble d-flex flex-row-reverse">
            <div class="avatar ms-2">
                <i class="bi bi-person-circle fs-5"></i>
            </div>
            <div class="bubble bg-primary text-white">
                <div class="content">${renderMarkdown(content)}</div>
                <small class="text-muted">${new Date().toLocaleTimeString()}</small>
            </div>
        </div>
    `;
    container.appendChild(userMessage);
    container.scrollTop = container.scrollHeight;
}

// ── Settings Management ────────────────────────────────────────
async function loadSettings() {
    const res = await safeFetch('/api/settings');
    document.getElementById('providerSelect').value = res.provider || 'openai';
    document.getElementById('modelInput').value = res.model || 'gpt-4o-mini';
    document.getElementById('tempSlider').value = res.temperature || 0.7;
    document.getElementById('tempValue').textContent = res.temperature || 0.7;
    document.getElementById('maxTokensInput').value = res.max_tokens || 1024;
    document.getElementById('systemMsgInput').value = res.system_message || '';
}

async function saveSettings() {
    const settings = {
        provider: document.getElementById('providerSelect').value,
        model: document.getElementById('modelInput').value,
        temperature: parseFloat(document.getElementById('tempSlider').value),
        max_tokens: parseInt(document.getElementById('maxTokensInput').value),
        system_message: document.getElementById('systemMsgInput').value,
    };
    await safeFetch('/api/settings', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(settings)
    });
}

function toggleSettings() {
    const panel = document.getElementById('settingsPanel');
    const chevron = document.getElementById('settingsChevron');
    const isVisible = panel.style.display !== 'none';
    
    panel.style.display = isVisible ? 'none' : 'block';
    chevron.className = isVisible ? 'bi bi-chevron-right' : 'bi bi-chevron-down';
}

function toggleSidebar() {
    document.getElementById('conversationSidebar').classList.toggle('d-none');
    document.querySelector('.col-md-9').classList.toggle('col-md-12');
}

// ── Markdown Rendering ──────────────────────────────────────────
function renderMarkdown(text) {
    if (typeof marked === 'undefined') return escapeHtml(text).replace(/\n/g, '<br>');
    
    // Configure marked for safe rendering
    marked.setOptions({
        breaks: true,
        gfm: true,
        highlight: function(code, lang) {
            if (lang && Prism.languages[lang]) {
                return Prism.highlight(code, Prism.languages[lang], lang);
            }
            return code;
        }
    });
    
    // Sanitize the output to prevent XSS
    const dirty = marked.parse(text);
    return DOMPurify.sanitize(dirty);
}

// ── Utilities ──────────────────────────────────────────────────
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function safeFetch(url, options = {}) {
    try {
        const response = await fetch(url, options);
        if (!response.ok) {
            const error = await response.json().catch(() => ({error: response.statusText}));
            throw new Error(error.error || response.statusText);
        }
        return await response.json();
    } catch (error) {
        console.error(`Fetch error [${url}]:`, error);
        showToast(error.message, 'danger');
        return {error: error.message};
    }
}

function showToast(message, type = 'info') {
    // Implementation of toast notification
    const toastContainer = document.getElementById('toastContainer') || createToastContainer();
    
    const toast = document.createElement('div');
    toast.className = `toast align-items-center text-white bg-${type} border-0`;
    toast.setAttribute('role', 'alert');
    toast.innerHTML = `
        <div class="d-flex">
            <div class="toast-body">${message}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    `;
    
    toastContainer.appendChild(toast);
    
    const bsToast = new bootstrap.Toast(toast, { delay: 5000 });
    bsToast.show();
    
    toast.addEventListener('hidden.bs.toast', () => {
        toast.remove();
    });
}

function createToastContainer() {
    const container = document.createElement('div');
    container.id = 'toastContainer';
    container.className = 'toast-container position-fixed bottom-0 end-0 p-3';
    document.body.appendChild(container);
    return container;
}
</script>
{% endblock %}
