<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINESE SCHOOL - API Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            color: #333;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
            border: 1px solid #dee2e6;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 FINESE SCHOOL API Test</h1>
        <p>Use this page to test if your Flask API is working correctly.</p>
        
        <div class="test-section">
            <h2>1. Health Check</h2>
            <button onclick="testHealth()">Test Health Endpoint</button>
            <div id="health-result"></div>
        </div>
        
        <div class="test-section">
            <h2>2. Get Topics</h2>
            <button onclick="testTopics()">Test Topics Endpoint</button>
            <div id="topics-result"></div>
        </div>
        
        <div class="test-section">
            <h2>3. Test Chat (Non-Streaming)</h2>
            <button onclick="testChat()">Send Test Question</button>
            <div id="chat-result"></div>
        </div>
        
        <div class="test-section">
            <h2>4. Test Streaming Chat</h2>
            <button onclick="testStreaming()">Test Streaming Response</button>
            <div id="stream-result"></div>
        </div>
        
        <div class="info">
            <strong>💡 Tip:</strong> Open browser console (F12) to see detailed logs
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000';
        
        async function testHealth() {
            const resultDiv = document.getElementById('health-result');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="status success">✅ Health check passed!</div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="status error">❌ Error: ${error.message}</div>
                `;
            }
        }
        
        async function testTopics() {
            const resultDiv = document.getElementById('topics-result');
            resultDiv.innerHTML = '<p>Loading topics...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/api/topics`);
                const data = await response.json();
                
                const topicList = Object.keys(data).map(topic => 
                    `<li><strong>${topic}</strong>: ${data[topic].name}</li>`
                ).join('');
                
                resultDiv.innerHTML = `
                    <div class="status success">✅ Found ${Object.keys(data).length} topics</div>
                    <ul>${topicList}</ul>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="status error">❌ Error: ${error.message}</div>
                `;
            }
        }
        
        async function testChat() {
            const resultDiv = document.getElementById('chat-result');
            resultDiv.innerHTML = '<p>Sending question...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        topic: 'Python',
                        question: 'What is a list comprehension?'
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    resultDiv.innerHTML = `
                        <div class="status error">❌ Error: ${data.error}</div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="status success">✅ Response received!</div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="status error">❌ Error: ${error.message}</div>
                `;
            }
        }
        
        async function testStreaming() {
            const resultDiv = document.getElementById('stream-result');
            resultDiv.innerHTML = '<p>Starting stream...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/api/chat/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        topic: 'Python',
                        question: 'Explain variables in Python'
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedData = [];
                
                resultDiv.innerHTML = '<p>🔄 Receiving stream...</p>';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                accumulatedData.push(data);
                                
                                // Update display
                                const statusClass = data.type === 'error' ? 'error' : 'success';
                                resultDiv.innerHTML = `
                                    <div class="status ${statusClass}">
                                        ✅ Received: ${data.type}
                                    </div>
                                    <pre>${JSON.stringify(accumulatedData, null, 2)}</pre>
                                `;
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
                
                resultDiv.innerHTML += `
                    <div class="status success">
                        ✅ Stream complete! Received ${accumulatedData.length} events
                    </div>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="status error">❌ Error: ${error.message}</div>
                `;
            }
        }
        
        // Auto-run health check on load
        window.addEventListener('load', () => {
            console.log('🧪 API Test Page Loaded');
            console.log('Click buttons to test different endpoints');
        });
    </script>
</body>
</html>
