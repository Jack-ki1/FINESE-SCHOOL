<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}FINESE SCHOOL{% endblock %}</title>
<meta name="description" content="Learn Python, AI, SQL, NoSQL, MCP, Power BI, Machine Learning, Deep Learning, Data Visualization, Git and 20+ Python libraries — offline-first, with an optional bring-your-own-key AI assistant.">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="site-header">
  <a class="brand" href="{{ url_for('home') }}">
    <span class="brand-mark">🎓</span>
    <span class="brand-text">
      <span class="brand-name">FINESE SCHOOL</span>
      <span class="brand-tag">learn it properly, offline or on</span>
    </span>
  </a>
  <div class="header-right">
    <span class="net-badge" id="global-net-badge" title="Lessons work offline — the AI assistant needs a connection">
      <span class="net-dot"></span><span class="net-label">checking…</span>
    </span>
  </div>
</header>

{% block content %}{% endblock %}

<footer class="site-footer">
  <p>FINESE SCHOOL — a self-hosted, offline-first learning platform. Built with Flask, HTML, CSS and vanilla JS. No tracking, no ads, your API keys never touch the server's disk.</p>
</footer>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
